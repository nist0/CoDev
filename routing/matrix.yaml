version: 1
routing_rules:
  # -------------------------
  # Routing entry point — meta-capability that routes requests to other capabilities
  # -------------------------
  - when:
      capability: routing
    suggest:
      agent: Router
      prompts: ["route"]
      skills: ["canonical-routing"]

  # -------------------------
  # Onboarding — interactive framework orientation
  # -------------------------
  - when:
      capability: onboarding
    suggest:
      agent: Router
      prompts: ["quickstart"]
      skills: ["canonical-routing"]
    # `quickstart` also handles named contributor profiles
    # (`maintenance`, `fast-feature`, `safe-refactor`, `doc-only`)
    # while keeping onboarding as the single routing entry point.

  # -------------------------
  # MCP integration
  # -------------------------
  - when:
      capability: mcp
    suggest:
      agent: mcp-specialist
      prompts: ["mcp-setup", "mcp-analyze", "mcp-debug"]
      skills:
        - "mcp-integration"
        - "vscode"

  # -------------------------
  # Debugging (domain-specific enrichment)
  # -------------------------
  - when:
      capability: debugging
      domain: devops-cloud
    suggest:
      agent: DevOps/Cloud
      prompts: ["k8s-triage", "helm-triage"]
      skills:
        - "kubernetes"
        - "aks"
        - "helm"
        - "logs-alerts"

  - when:
      capability: debugging
      domain: web-hosting
    suggest:
      agent: DevOps/Cloud
      prompts: ["triage-error", "logs-analysis"]
      skills:
        - "cloud-web-hosting"

  - when:
      capability: debugging
      domain: observability
    suggest:
      agent: Reliability
      prompts: ["logs-analysis", "apm-analysis"]
      skills:
        - "logs-alerts"
        - "elastic"
        - "apm"

  - when:
      capability: debugging
      domain: backend-dotnet
    suggest:
      agent: Backend .NET
      prompts: ["triage-error", "logs-analysis"]
      skills:
        - "triage"
        - "logs-alerts"
        - "apm"

  - when:
      capability: debugging
      domain: native
    suggest:
      agent: Native/Systems
      prompts: ["triage-error"]
      skills:
        - "triage"

  - when:
      capability: debugging
      domain: frontend
    suggest:
      agent: Frontend
      prompts: ["triage-error"]
      skills:
        - "react"
        - "typescript"
        - "triage"

  - when:
      capability: debugging
      domain: cicd
    suggest:
      agent: DevOps/Cloud
      prompts: ["logs-analysis", "triage-error"]
      skills:
        - "github-actions"
        - "logs-alerts"
        - "triage"

  - when:
      capability: debugging
      domain: scripting
    suggest:
      agent: Automation/Scripting
      prompts: ["triage-error"]
      skills:
        - "python"
        - "perl"
        - "triage"

  - when:
      capability: debugging
      domain: shell-automation
    suggest:
      agent: Automation/Scripting
      prompts: ["triage-error"]
      skills:
        - "bash"
        - "powershell"
        - "triage"

  - when:
      capability: debugging
      domain: github-delivery
    suggest:
      agent: Delivery Lead
      prompts: ["triage-error", "logs-analysis"]
      skills:
        - "triage"
        - "github-actions"
        - "delivery"

  - when:
      capability: debugging
    suggest:
      agent: Reliability
      prompts: ["triage-error"]
      skills:
        - "triage"

  # -------------------------
  # Postmortem
  # -------------------------
  - when:
      capability: postmortem
    suggest:
      agent: Reliability
      prompts: ["postmortem"]
      skills:
        - "rca-kit"

  # -------------------------
  # Code analysis / explanation
  # -------------------------
  - when:
      capability: code-analysis
      domain: backend-dotnet
    suggest:
      agent: Backend .NET
      prompts: ["dotnet-excellence", "explain-code"]
      skills:
        - "aspnet-core"
        - "ef-core"
        - "dotnet-testing"
        - "dotnet-cli"

  - when:
      capability: code-analysis
      domain: frontend
    suggest:
      agent: Frontend
      prompts: ["explain-code"]
      skills:
        - "react"
        - "typescript"
        - "js-testing"

  - when:
      capability: code-analysis
      domain: devops-cloud
    suggest:
      agent: DevOps/Cloud
      prompts: ["explain-code"]
      skills:
        - "docker"
        - "helm"
        - "kubernetes"
        - "az"
        - "repo-understanding"

  - when:
      capability: code-analysis
      domain: web-hosting
    suggest:
      agent: DevOps/Cloud
      prompts: ["explain-code"]
      skills:
        - "cloud-web-hosting"

  - when:
      capability: code-analysis
      domain: native
    suggest:
      agent: Native/Systems
      prompts: ["explain-code"]
      skills:
        - "c"
        - "cpp"
        - "repo-understanding"

  - when:
      capability: code-analysis
      domain: cicd
    suggest:
      agent: DevOps/Cloud
      prompts: ["explain-code"]
      skills:
        - "github-actions"
        - "repo-understanding"

  - when:
      capability: code-analysis
      domain: scripting
    suggest:
      agent: Automation/Scripting
      prompts: ["explain-code"]
      skills:
        - "python"
        - "perl"
        - "repo-understanding"

  - when:
      capability: code-analysis
      domain: shell-automation
    suggest:
      agent: Automation/Scripting
      prompts: ["explain-code"]
      skills:
        - "bash"
        - "powershell"
        - "repo-understanding"

  - when:
      capability: code-analysis
      domain: observability
    suggest:
      agent: Reliability
      prompts: ["explain-code"]
      skills:
        - "elastic"
        - "apm"
        - "repo-understanding"

  - when:
      capability: code-analysis
      domain: github-delivery
    suggest:
      agent: Delivery Lead
      prompts: ["pr-review", "explain-code"]
      skills:
        - "pr-review"
        - "repo-understanding"

  - when:
      capability: code-analysis
      domain: project-orchestration
    suggest:
      agent: Architect
      prompts: ["explain-code"]
      skills:
        - "repo-understanding"
        - "adr"

  - when:
      capability: code-analysis
      domain: ai-ml-engineering
    suggest:
      agent: Architect
      prompts: ["explain-code"]
      skills:
        - "llm-integration"
        - "rag-patterns"

  - when:
      capability: code-analysis
    suggest:
      agent: Architect
      prompts: ["explain-code"]
      skills:
        - "repo-understanding"

  # -------------------------
  # Documentation / Onboarding
  # -------------------------
  - when:
      capability: docs
    suggest:
      agent: Delivery Lead
      prompts: ["generate-onboarding", "generate-docs-tree"]
      skills:
        - "onboarding-factory"
        - "repo-understanding"

  - when:
      capability: docs-system
      domain: docs-system
    suggest:
      agent: Delivery Lead
      prompts: ["generate-docs-tree", "doc-lint-fix", "diagram-ops", "markdown-ops"]
      skills:
        - "doc-architecture-model"
        - "doc-qa"
        - "diagram-tooling"
        - "markdown-docops"

  - when:
      capability: docs-system
      domain: backend-dotnet
    suggest:
      agent: Backend .NET
      prompts: ["generate-docs-tree", "doc-lint-fix"]
      skills:
        - "aspnet-core"
        - "openapi"
        - "doc-qa"

  - when:
      capability: docs-system
      domain: frontend
    suggest:
      agent: Frontend
      prompts: ["generate-docs-tree", "doc-lint-fix"]
      skills:
        - "react"
        - "typescript"
        - "doc-qa"

  - when:
      capability: docs-system
      domain: devops-cloud
    suggest:
      agent: DevOps/Cloud
      prompts: ["generate-docs-tree", "doc-lint-fix"]
      skills:
        - "helm"
        - "kubernetes"
        - "doc-qa"

  - when:
      capability: docs-system
      domain: native
    suggest:
      agent: Native/Systems
      prompts: ["generate-docs-tree", "doc-lint-fix"]
      skills:
        - "c"
        - "cpp"
        - "doc-qa"

  - when:
      capability: docs-system
      domain: github-delivery
    suggest:
      agent: Delivery Lead
      prompts: ["doc-lint-fix", "pr-review"]
      skills:
        - "doc-qa"
        - "delivery"
        - "pr-review"

  - when:
      capability: docs-system
      domain: cicd
    suggest:
      agent: DevOps/Cloud
      prompts: ["doc-lint-fix"]
      skills:
        - "github-actions"
        - "doc-qa"

  - when:
      capability: docs-system
    suggest:
      agent: Delivery Lead
      prompts: ["generate-docs-tree", "doc-lint-fix", "diagram-ops", "markdown-ops"]
      skills:
        - "doc-architecture-model"
        - "doc-qa"
        - "diagram-tooling"
        - "markdown-docops"

  # -------------------------
  # Testing & Quality
  # -------------------------
  - when:
      capability: testing-quality
      domain: backend-dotnet
    suggest:
      agent: Backend .NET
      prompts: ["test-plan", "write-tests", "linters-stack"]
      skills:
        - "test-strategy"
        - "dotnet-testing"
        - "linters"
        - "github-actions"

  - when:
      capability: testing-quality
      domain: frontend
    suggest:
      agent: Frontend
      prompts: ["test-plan", "write-tests", "linters-stack"]
      skills:
        - "test-strategy"
        - "js-testing"
        - "linters"
        - "github-actions"

  - when:
      capability: testing-quality
      domain: native
    suggest:
      agent: Native/Systems
      prompts: ["test-plan", "linters-stack"]
      skills:
        - "test-strategy"
        - "linters"

  - when:
      capability: testing-quality
      domain: cicd
    suggest:
      agent: DevOps/Cloud
      prompts: ["test-plan", "linters-stack"]
      skills:
        - "github-actions"
        - "linters"

  - when:
      capability: testing-quality
      domain: devops-cloud
    suggest:
      agent: DevOps/Cloud
      prompts: ["test-plan", "linters-stack"]
      skills:
        - "test-strategy"
        - "github-actions"
        - "helm"
        - "kubernetes"

  - when:
      capability: testing-quality
