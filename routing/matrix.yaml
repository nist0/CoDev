        - "python"
        - "perl"
        - "linters"

  - when:
      capability: testing-quality
      domain: shell-automation
    suggest:
      agent: Automation/Scripting
      prompts: ["test-plan", "write-tests", "linters-stack"]
      skills:
        - "test-strategy"
        - "bash"
        - "powershell"
        - "linters"

  - when:
      capability: testing-quality
      domain: observability
    suggest:
      agent: Reliability
      prompts: ["test-plan", "linters-stack"]
      skills:
        - "test-strategy"
        - "logs-alerts"
        - "apm"

  - when:
      capability: testing-quality
      domain: docs-system
    suggest:
      agent: Delivery Lead
      prompts: ["doc-lint-fix", "test-plan"]
      skills:
        - "doc-qa"
        - "linters"

  - when:
      capability: testing-quality
      domain: github-delivery
    suggest:
      agent: Delivery Lead
      prompts: ["test-plan", "pr-review"]
      skills:
        - "delivery"
        - "pr-review"
        - "test-strategy"

  - when:
      capability: testing-quality
      domain: project-orchestration
    suggest:
      agent: Architect
      prompts: ["test-plan"]
      skills:
        - "test-strategy"
        - "fullstack-test-strategy"

  - when:
      capability: testing-quality
      domain: ai-ml-engineering
    suggest:
      agent: Architect
      prompts: ["test-plan", "write-tests"]
      skills:
        - "llm-integration"
        - "rag-patterns"

  - when:
      capability: testing-quality
    suggest:
      agent: Architect
      prompts: ["test-plan", "write-tests", "linters-stack"]
      skills:
        - "test-strategy"
        - "linters"

  # -------------------------
  # GitHub delivery
  # -------------------------
  - when:
      capability: github-delivery
      domain: github-delivery
    suggest:
      agent: GitHub Ops
      prompts: ["pr-review"]
      skills:
        - "pr-review"
        - "delivery"
        - "issues"
        - "commits"

  - when:
      capability: github-delivery
      domain: devops-cloud
    suggest:
      agent: DevOps/Cloud
      prompts: ["pr-review"]
      skills:
        - "pr-review"
        - "delivery"
        - "helm"
        - "kubernetes"

  - when:
      capability: github-delivery
      domain: backend-dotnet
    suggest:
      agent: Backend .NET
      prompts: ["pr-review"]
      skills:
        - "pr-review"
        - "delivery"
        - "dotnet-testing"

  - when:
      capability: github-delivery
      domain: cicd
    suggest:
      agent: DevOps/Cloud
      prompts: ["pr-review"]
      skills:
        - "pr-review"
        - "delivery"
        - "github-actions"

  - when:
      capability: github-delivery
      domain: docs-system
    suggest:
      agent: Delivery Lead
      prompts: ["pr-review"]
      skills:
        - "pr-review"
        - "delivery"
        - "doc-qa"

  - when:
      capability: github-delivery
    suggest:
      agent: Delivery Lead
      prompts: ["pr-review"]
      skills:
        - "pr-review"

  # -------------------------
  # Release
  # -------------------------
  - when:
      capability: release
    suggest:
      agent: Delivery Lead
      prompts: ["release-plan"]
      skills:
        - "release"
        - "supply-chain"

  # -------------------------
  # Automation / Scripting
  # -------------------------
  - when:
      capability: automation
      domain: scripting
    suggest:
      agent: Automation/Scripting
      prompts: ["automation-script"]
      skills:
        - "python"
        - "perl"

  - when:
      capability: automation
      domain: shell-automation
    suggest:
      agent: Automation/Scripting
      prompts: ["automation-script"]
      skills:
        - "bash"
        - "powershell"
        - "batch"

  - when:
      capability: automation
      domain: devops-cloud
    suggest:
      agent: DevOps/Cloud
      prompts: ["automation-script"]
      skills:
        - "github-actions"
        - "docker"
        - "kubernetes"
        - "az"

  - when:
      capability: automation
      domain: web-hosting
    suggest:
      agent: DevOps/Cloud
      prompts: ["automation-script"]
      skills:
        - "cloud-web-hosting"

  - when:
      capability: automation
      domain: cicd
    suggest:
      agent: DevOps/Cloud
      prompts: ["automation-script"]
      skills:
        - "github-actions"

  - when:
      capability: automation
      domain: frontend
    suggest:
      agent: Frontend
      prompts: ["automation-script"]
      skills:
        - "npm"
        - "react"

  - when:
      capability: automation
      domain: backend-dotnet
    suggest:
      agent: Backend .NET
      prompts: ["automation-script"]
      skills:
        - "dotnet-cli"

  - when:
      capability: automation
      domain: native
    suggest:
      agent: Native/Systems
      prompts: ["automation-script"]
      skills:
        - "c"
        - "cpp"

  - when:
      capability: automation
      domain: observability
    suggest:
      agent: Automation/Scripting
      prompts: ["automation-script"]
      skills:
        - "logs-alerts"
        - "python"
        - "powershell"

  - when:
      capability: automation
      domain: github-delivery
    suggest:
      agent: Delivery Lead
      prompts: ["automation-script"]
      skills:
        - "github-actions"
        - "delivery"

  - when:
      capability: automation
    suggest:
      agent: Automation/Scripting
      prompts: ["automation-script"]
      skills:
        - "python"
        - "powershell"

  # -------------------------
  # Project orchestration
  # -------------------------
  - when:
      capability: project-orchestration
      domain: project-orchestration
    suggest:
      agent: Project Orchestrator
      prompts: ["project-kickoff", "project-dispatch", "project-governance"]
      skills:
        - "project-orchestration"
        - "github-work-management"

  - when:
      capability: project-orchestration
      domain: github-delivery
    suggest:
      agent: Project Orchestrator
      prompts: ["project-dispatch", "project-governance"]
      skills:
        - "project-orchestration"
        - "github-work-management"

  - when:
      capability: project-orchestration
    suggest:
      agent: Project Orchestrator
      prompts: ["project-kickoff", "project-dispatch", "project-governance"]
      skills:
        - "project-orchestration"
        - "github-work-management"

  # -------------------------
  # Routing feedback loop
  # -------------------------
  - when:
      capability: route-miss
    suggest:
      agent: Router
      prompts: ["route-miss"]
      skills: ["canonical-routing"]

  # -------------------------
  # Research
  # -------------------------
  - when:
      capability: brainstorming
    suggest:
      agent: Innovator
      prompts: ["brainstorm"]
      skills:
        - "innovation-sprint"
        - "elite-brainstorming"

  - when:
      capability: tech-watch
    suggest:
      agent: Tech Scout
      prompts: ["tech-watch-digest"]
      skills:
        - "weekly-digest"

  # -------------------------
  # Security
  # -------------------------
  - when:
      capability: security
      domain: backend-dotnet
    suggest:
      agent: Security
      prompts: ["vuln-triage", "secrets-audit", "threat-model"]
      skills:
        - "threat-modeling"

  - when:
      capability: security
      domain: devops-cloud
    suggest:
      agent: Security
      prompts: ["threat-model", "vuln-triage"]
      skills:
        - "threat-modeling"

  - when:
      capability: security
      domain: frontend
    suggest:
      agent: Security
      prompts: ["threat-model", "vuln-triage", "secrets-audit"]
      skills:
        - "threat-modeling"
        - "react"
        - "typescript"

  - when:
      capability: security
      domain: cicd
    suggest:
      agent: Security
      prompts: ["secrets-audit", "vuln-triage"]
      skills:
        - "threat-modeling"
        - "github-actions"
        - "supply-chain"

  - when:
      capability: security
      domain: native
    suggest:
      agent: Security
      prompts: ["threat-model", "vuln-triage"]
      skills:
        - "threat-modeling"

  - when:
      capability: security
      domain: scripting
    suggest:
      agent: Security
      prompts: ["secrets-audit", "vuln-triage"]
      skills:
        - "threat-modeling"
        - "bash"

  - when:
      capability: security
      domain: shell-automation
    suggest:
      agent: Security
      prompts: ["secrets-audit", "vuln-triage"]
      skills:
        - "threat-modeling"
        - "bash"
        - "powershell"

  - when:
      capability: security
      domain: observability
    suggest:
      agent: Security
      prompts: ["vuln-triage", "threat-model"]
      skills:
        - "threat-modeling"
        - "logs-alerts"

  - when:
      capability: security
      domain: github-delivery
    suggest:
      agent: Security
      prompts: ["secrets-audit", "vuln-triage"]
      skills:
        - "threat-modeling"
        - "pr-review"
        - "supply-chain"

  - when:
      capability: security
      domain: docs-system
    suggest:
      agent: Security
      prompts: ["threat-model"]
      skills:
        - "threat-modeling"
        - "doc-qa"

  - when:
      capability: security
    suggest:
      agent: Security
      prompts: ["threat-model", "vuln-triage", "secrets-audit"]
      skills:
        - "threat-modeling"

  # ── Scaffolding / Code Generation ────────────────────────────────────────
  - when:
      capability: scaffolding
      domain: backend-dotnet
    suggest:
      agent: Backend .NET
      prompts: ["generate-controller"]
      skills:
        - "rest-api-controller-gen"
        - "rest-api-bootstrap"
        - "aspnet-core"
        - "mediatr"
        - "openapi"
        - "dotnet-testing"

  - when:
      capability: scaffolding
      domain: scripting
    suggest:
      agent: Backend .NET
      prompts: ["generate-controller"]
      skills:
        - "rest-api-bootstrap"
        - "python"
        - "bash"

  - when:
      capability: scaffolding
      domain: shell-automation
    suggest:
      agent: Backend .NET
      prompts: ["generate-controller"]
      skills:
        - "rest-api-bootstrap"
        - "bash"

  - when:
      capability: scaffolding
    suggest:
      agent: Backend .NET
      prompts: ["generate-controller"]
      skills:
        - "rest-api-controller-gen"
        - "rest-api-bootstrap"
        - "aspnet-core"

  # ── REST API Engineering Lifecycle ───────────────────────────────────────
  - when:
      capability: rest-api-engineering
      domain: backend-dotnet
    suggest:
      agent: REST API Engineer
      prompts: ["rest-api-new-service", "rest-api-add-resource", "rest-api-review"]
      skills:
        - "rest-api-design-governance"
        - "rest-api-runtime-quality"
        - "aspnet-core"
        - "mediatr"
        - "openapi"
        - "ef-core"
        - "postgres"
        - "dotnet-testing"

  - when:
      capability: rest-api-engineering
      domain: devops-cloud
    suggest:
      agent: REST API Engineer
      prompts: ["rest-api-review", "rest-api-add-resource"]
      skills:
        - "rest-api-runtime-quality"
        - "aspnet-core"
        - "openapi"
        - "github-actions"
        - "delivery"

  - when:
      capability: rest-api-engineering
      domain: observability
    suggest:
      agent: REST API Engineer
      prompts: ["rest-api-review"]
      skills:
        - "rest-api-runtime-quality"
        - "aspnet-core"
        - "openapi"
        - "apm"
        - "logs-alerts"

  - when:
      capability: rest-api-engineering
      domain: github-delivery
    suggest:
      agent: REST API Engineer
      prompts: ["rest-api-review"]
      skills:
        - "rest-api-design-governance"
        - "rest-api-runtime-quality"
        - "aspnet-core"
        - "openapi"
        - "pr-review"

  - when:
      capability: rest-api-engineering
      domain: cicd
    suggest:
      agent: REST API Engineer
      prompts: ["rest-api-review"]
      skills:
        - "rest-api-runtime-quality"
        - "aspnet-core"
        - "openapi"
        - "github-actions"
        - "delivery"

  - when:
      capability: rest-api-engineering
    suggest:
      agent: REST API Engineer
      prompts: ["rest-api-new-service", "rest-api-add-resource", "rest-api-review"]
      skills:
        - "rest-api-design-governance"
        - "rest-api-runtime-quality"
        - "aspnet-core"
        - "openapi"

  # ── Mermaid Diagrams ─────────────────────────────────────────────────────
  - when:
      capability: mermaid
    suggest:
      agent: mermaid-diagrammer
      prompts: ["mermaid-create", "mermaid-review", "mermaid-embed"]
      skills:
        - "mermaid"
        - "diagram-tooling"
        - "markdown-docops"

  # ── CoDev Submodule Management ───────────────────────────────────────────
  - when:
      capability: codev-management
      domain: cicd
    suggest:
      agent: CoDev Consumer
